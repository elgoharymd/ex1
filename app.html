    <style>
        * { font-family: 'Cairo', sans-serif; }
        html { scroll-behavior: smooth; }
        :root { --primary: #2563eb; --primary-dark: #1d4ed8; }
        body { background: linear-gradient(135deg, #f8fafc, #eff6ff); }
        
        .glass-nav { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(37,99,235,0.15); }
        .premium-card { background: white; border-radius: 24px; transition: all 0.3s ease; border: 1px solid rgba(37,99,235,0.1); overflow: hidden; cursor: pointer; }
        .premium-card:hover { transform: translateY(-5px); box-shadow: 0 20px 30px -15px rgba(0,0,0,0.15); }
        .card-cover { height: 200px; background-size: cover; background-position: center; background-color: #e2e8f0; }
        .gradient-text { background: linear-gradient(135deg, #1e40af, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .admin-panel { position: fixed; top: 0; right: -100%; width: 85%; max-width: 450px; height: 100vh; background: white; z-index: 1000; transition: right 0.3s ease; overflow-y: auto; box-shadow: -5px 0 30px rgba(0,0,0,0.2); }
        .admin-panel.open { right: 0; }
        .admin-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
        .admin-overlay.open { display: block; }
        .admin-tab { padding: 8px 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .admin-tab.active { background: var(--primary); color: white; }
        
        /* Quiz Styles - New Design */
        .quiz-question-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid #eef2ff;
        }
        
        .quiz-question-card:hover {
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        
        .quiz-question-number {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            margin-left: 12px;
        }
        
        .quiz-option {
            padding: 12px 16px;
            border-radius: 14px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            font-weight: 500;
        }
        
        .quiz-option:hover {
            border-color: var(--primary);
            background: #eff6ff;
            transform: translateX(-3px);
        }
        
        .quiz-option.selected {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border-color: #1e40af;
            transform: scale(1.02);
        }
        
        /* Result Styles */
        .result-card {
            border-radius: 28px;
            padding: 30px;
            text-align: center;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-normal { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .result-recovery { background: linear-gradient(135deg, #eab308, #ca8a04); }
        .result-severe { background: linear-gradient(135deg, #ef4444, #dc2626); }
        
        .score-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            backdrop-filter: blur(5px);
        }
        
        .progress-bar-custom {
            height: 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.3);
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 20px;
            background: white;
            transition: width 1.2s cubic-bezier(0.22, 0.97, 0.36, 1);
            width: 0%;
        }
        
        .admin-trigger { position: fixed; bottom: 20px; left: 20px; width: 45px; height: 45px; background: rgba(30,41,59,0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 98; }
        .admin-trigger:hover { background: #1e293b; transform: scale(1.05); }
        .admin-trigger i { color: white; font-size: 20px; }
        
        .scroll-top { position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; visibility: hidden; transition: 0.3s; z-index: 99; }
        .scroll-top.visible { opacity: 1; visibility: visible; }
        
        .empty-state { text-align: center; padding: 50px 20px; background: white; border-radius: 24px; border: 2px dashed #cbd5e1; }
        .empty-state i { font-size: 50px; color: #94a3b8; margin-bottom: 15px; }
        
        .shimmer { background: linear-gradient(90deg, #f1f5f9 0%, #e2e8f0 50%, #f1f5f9 100%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 20px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .detail-container { max-width: 900px; margin: 0 auto; background: white; border-radius: 32px; padding: 25px; box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1); }
        .detail-cover { width: 100%; height: 250px; background-size: cover; background-position: center; background-color: #e2e8f0; border-radius: 20px; margin-bottom: 25px; }
        .share-btn { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; cursor: pointer; transition: 0.3s; padding: 8px 16px; border-radius: 12px; }
        .share-btn:hover { background: #16a34a; color: white; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .logo-img { height: 40px; width: auto; object-fit: contain; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 16px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .grid-responsive { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        @media (max-width: 640px) { .grid-responsive { gap: 1rem; } }
        .nav-link { transition: 0.2s; }
        .nav-link:hover { color: var(--primary); }

        .quiz-progress {
            background: #e2e8f0;
            border-radius: 30px;

            height: 100%;
            border-radius: 30px;
            transition: width 0.3s ease;
            width: 0%;
        }
    </style>

        // Helpers
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
        
        function getYouTubeEmbedUrl(url) {
            if (!url) return '';
            if (url.includes('youtu.be/')) {
                let id = url.split('youtu.be/')[1];
                if (id) { id = id.split('?')[0]; return `https://www.youtube.com/embed/${id}`; }
            }
            if (url.includes('youtube.com/watch')) {
                let params = new URLSearchParams(url.split('?')[1]);
                let id = params.get('v');
                if (id) return `https://www.youtube.com/embed/${id}`;
            }
            return url;
        }
        
        // Initialize AOS
        AOS.init({ duration: 800, once: true });
        
        // Scroll to top
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollTopBtn');
            if (window.scrollY > 300) btn.classList.add('visible');
            else btn.classList.remove('visible');
        });
        
        // Navigation
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href === './' || href === '#' || href === '') {
                    e.preventDefault();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else if (href.startsWith('#')) {
                    e.preventDefault();
                    const target = document.getElementById(href.substring(1));
                    if (target) target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
        
        // Routing
        function getParams() {
            const p = new URLSearchParams(window.location.search);
            return { type: p.get('type'), id: p.get('id') };
        }
        
        async function route() {
            const p = getParams();
            if (p.type && p.id) {
                await showDetailPage(p.type, p.id);
            } else {
                await showHome();
            }
        }
        
        window.sharePage = function() {
            const url = window.location.href;
            if (navigator.share) navigator.share({ title: document.title, url: url });
            else navigator.clipboard.writeText(url).then(() => Swal.fire("تم نسخ الرابط", "", "success"));
        };
        
        // Detail Page
        async function showDetailPage(type, id) {
            const main = document.getElementById('mainContent');
            main.innerHTML = '<div class="shimmer h-96 max-w-4xl mx-auto"></div>';
            try {
                const snap = await db.ref(`${type}/${id}`).once('value');
                const item = snap.val();
                if (!item) throw new Error();
                document.title = `${item.title} | دوبامين`;
                
                let typeName = '';
                if (type === 'reports') typeName = 'تقرير علمي';
                else if (type === 'articles') typeName = 'مقالة';
                else if (type === 'news') typeName = 'خبر';
                else if (type === 'interviews') typeName = 'حوار';
                else if (type === 'investigations') typeName = 'تحقيق';
                else typeName = type;
                
                let contentHtml = '';
                if (item.image) contentHtml += `<img src="${item.image}" class="w-full rounded-xl my-4" onerror="this.src='https://placehold.co/600x400/e2e8f0/64748b?text=No+Image'">`;
                if (item.content) contentHtml += `<p class="mb-4">${escapeHtml(item.content)}</p>`;
                
                main.innerHTML = `
                    <div class="detail-container">
                        <div class="detail-cover" style="background-image: url('${item.image || ''}')"></div>
                        <div class="flex justify-between items-center mb-4 flex-wrap gap-2">

                document.getElementById('backToHomeBtn')?.addEventListener('click', function(e) {

        // Load Sections

        // ==================== RESTRUCTURED QUIZ SECTION ====================
        
        async function loadQuiz() {
            const container = document.getElementById('quizContainer');
            if (!container) return;
            
            const snap = await db.ref('quiz/questions').once('value');
            if (snap.exists()) {
                quizQuestions = snap.val();
            } else {
                quizQuestions = defaultQuiz;
                await db.ref('quiz/questions').set(defaultQuiz);
            }
            
            userAnswers = new Array(quizQuestions.length).fill(-1);
            renderAllQuestions();
        }
        
        function renderAllQuestions() {
            const container = document.getElementById('quizContainer');
            if (!container) return;
            
            let html = `
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <i class="fas fa-clipboard-list text-blue-600 text-xl"></i>
                            <span class="text-gray-600">${quizQuestions.length} سؤال</span>
                        </div>
                        <div class="quiz-progress w-48">
                            <div class="quiz-progress-fill" id="quizProgressFill" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="border-b border-gray-200 mb-4"></div>
                </div>
            `;
            
            for (let i = 0; i < quizQuestions.length; i++) {
                const q = quizQuestions[i];
                const isAnswered = userAnswers[i] !== -1;
                html += `
                    <div class="quiz-question-card" data-qidx="${i}">
                        <div class="flex items-start gap-3 mb-4">
                            <div class="quiz-question-number">${i+1}</div>
                            <div class="flex-1">
                                <p class="font-bold text-gray-800 text-base md:text-lg">${escapeHtml(q.text)}</p>
                                ${isAnswered ? `<span class="text-xs text-green-600 mt-1 inline-block"><i class="fas fa-check-circle"></i> تم الإجابة</span>` : ''}
                            </div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                            ${q.options.map((opt, oidx) => `
                                <div class="quiz-option ${userAnswers[i] === oidx ? 'selected' : ''}" data-q="${i}" data-opt="${oidx}">
                                    ${escapeHtml(opt)}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            html += `
                <div class="mt-8 text-center">
                    <button id="submitQuizFinalBtn" class="px-8 py-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-xl font-bold text-lg hover:shadow-xl transition-all flex items-center gap-2 mx-auto">
                        <i class="fas fa-chart-line"></i> تحليل النتيجة النهائية
                    </button>
                </div>
            `;
            
            container.innerHTML = html;
            
            // Update progress
            const answeredCount = userAnswers.filter(a => a !== -1).length;
            const progressPercent = (answeredCount / quizQuestions.length) * 100;
            const progressFill = document.getElementById('quizProgressFill');
            if (progressFill) progressFill.style.width = progressPercent + '%';
            
            // Attach click events to options
            document.querySelectorAll('.quiz-option').forEach(el => {
                el.addEventListener('click', function() {
                    const q = parseInt(this.dataset.q);
                    const o = parseInt(this.dataset.opt);
                    userAnswers[q] = o;
                    
                    // Update UI
                    const questionCard = this.closest('.quiz-question-card');
                    questionCard.querySelectorAll('.quiz-option').forEach(x => x.classList.remove('selected'));
                    this.classList.add('selected');
                    
                    // Add answered indicator
                    const answeredSpan = questionCard.querySelector('.text-green-600');
                    if (!answeredSpan) {
                        const flexDiv = questionCard.querySelector('.flex-1');
                        flexDiv.innerHTML += `<span class="text-xs text-green-600 mt-1 inline-block"><i class="fas fa-check-circle"></i> تم الإجابة</span>`;
                    }
                    
                    // Update progress bar
                    const newAnsweredCount = userAnswers.filter(a => a !== -1).length;
                    const newProgress = (newAnsweredCount / quizQuestions.length) * 100;
                    const progressFillEl = document.getElementById('quizProgressFill');
                    if (progressFillEl) progressFillEl.style.width = newProgress + '%';
                });
            });
            
            // Submit button
            const submitBtn = document.getElementById('submitQuizFinalBtn');
            if (submitBtn) {
                submitBtn.addEventListener('click', calculateAndShowResult);
            }
        }
        
        function calculateScore() {
            let total = 0;
            let max = quizQuestions.length * 4;
            for (let i = 0; i < quizQuestions.length; i++) {
                if (userAnswers[i] !== -1) {
                    total += quizQuestions[i].scores[userAnswers[i]];
                } else {
                    total += 1; // Default to lowest score for unanswered
                }
            }
            return Math.round((total / max) * 100);
        }
        
        async function calculateAndShowResult() {
            // Check for unanswered
            let unanswered = [];
            for (let i = 0; i < quizQuestions.length; i++) {
                if (userAnswers[i] === -1) unanswered.push(i + 1);
            }
            
            if (unanswered.length > 0) {
                Swal.fire({
                    title: "أسئلة غير مكتملة",
                    text: `الرجاء الإجابة على الأسئلة: ${unanswered.join(', ')}`,
                    icon: "warning",
                    confirmButtonColor: "#2563eb"
                });
                return;
            }
            
            const percentage = calculateScore();
            
            let resultClass = '', title = '', message = '', advice = '', icon = '';
            if (percentage <= 40) {
                resultClass = 'result-normal';
                title = '🟢 درجة إدمان منخفضة';
                message = 'ممتاز! مستوى اعتمادك على محفزات الدوبامين ضمن المعدل الطبيعي.';
                advice = '✅ حافظ على عاداتك الصحية\n✅ مارس الهوايات الإيجابية\n✅ استمر في توازنك الحياتي';
                icon = 'fa-face-smile';
            } else if (percentage <= 60) {
                resultClass = 'result-recovery';
                title = '🟡 درجة إدمان متوسطة';
                message = 'لديك بعض السلوكيات التي تشير إلى اعتماد زائد على محفزات الدوبامين.';
                advice = '📱 قلل استخدام وسائل التواصل ساعة يومياً\n🏃 مارس الرياضة 30 دقيقة يومياً\n😴 نام 7-8 ساعات\n🚫 تجنب المشتريات الاندفاعية';
                icon = 'fa-face-meh';
            } else {
                resultClass = 'result-severe';
                title = '🔴 درجة إدمان عالية';
                message = 'نتائجك تشير إلى اعتماد شديد على محفزات الدوبامين مما يؤثر على جودة حياتك.';
                advice = '⚠️ ننصحك باستشارة طبيب نفسي متخصص\n⚠️ تواصل مع خط الدعم النفسي\n⚠️ فكر في برامج العلاج السلوكي\n⚠️ تحدث مع شخص تثق به عن مشاعرك';
                icon = 'fa-face-frown';
            }
            
            const resultDiv = document.getElementById('quizResult');
            resultDiv.innerHTML = `
                <div class="${resultClass} result-card">
                    <i class="fas ${icon} text-5xl mb-4"></i>
                    <h3 class="text-2xl font-bold mb-4">${title}</h3>
                    <div class="score-circle">
                        <span class="text-5xl font-bold">${percentage}%</span>
                        <span class="text-sm opacity-90">نسبة الإدمان</span>
                    </div>
                    <div class="progress-bar-custom w-full max-w-md mx-auto my-6">
                        <div class="progress-fill" style="width: 0%"></div>
                    </div>
                    <p class="text-lg mb-4 max-w-md mx-auto">${message}</p>
                    <div class="bg-white/20 rounded-xl p-4 text-right max-w-md mx-auto">
                        <p class="text-sm whitespace-pre-line font-semibold">📋 نصائح مخصصة لك:</p>
                        <p class="text-sm whitespace-pre-line mt-2">${advice}</p>
                    </div>
                    <div class="flex gap-3 justify-center mt-6">
                        <button onclick="resetQuiz()" class="px-6 py-2 bg-white text-gray-800 rounded-xl font-semibold hover:bg-gray-100 transition">
                            <i class="fas fa-redo-alt ml-1"></i> إعادة الاختبار
                        </button>
                        <button onclick="shareResult(${percentage})" class="px-6 py-2 bg-white/20 text-white rounded-xl font-semibold hover:bg-white/30 transition">
                            <i class="fas fa-share-alt ml-1"></i> مشاركة النتيجة
                        </button>
                    </div>
                </div>
            `;
            resultDiv.classList.remove('hidden');
            
            // Animate progress bar
            setTimeout(() => {
                const fill = document.querySelector('.progress-fill');
                if (fill) fill.style.width = percentage + '%';
            }, 100);
            
            // Scroll to result
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // Save to database
            try {
                await db.ref('quiz_results').push().set({ percentage: percentage, date: new Date().toISOString() });
                await loadCounts();
            } catch(e) {}
        }
        
        function resetQuiz() {
            userAnswers.fill(-1);
            const container = document.getElementById('quizContainer');
            if (container) renderAllQuestions();
            const resultDiv = document.getElementById('quizResult');
            if (resultDiv) resultDiv.classList.add('hidden');
            window.scrollTo({ top: document.getElementById('quiz').offsetTop - 100, behavior: 'smooth' });
        }
        
        function shareResult(percentage) {
            const text = `نتيجتي في مقياس إدمان الدوبامين: ${percentage}% - دوبامين | المركز العلمي`;
            if (navigator.share) {
                navigator.share({ title: 'نتيجة مقياس الدوبامين', text: text, url: window.location.href });
            } else {
                navigator.clipboard.writeText(text + ' ' + window.location.href);
                Swal.fire("تم النسخ", "تم نسخ النتيجة للحافظة", "success");
            }
        }

                        <a href="#quiz" class="px-4 md:px-6 py-1.5 md:py-2 bg-white border-2 border-blue-600 text-blue-600 rounded-xl text-sm">اختبر نفسك</a>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-3 gap-2 md:gap-4 mb-6" data-aos="fade-up">
                    <div class="bg-white rounded-xl p-3 text-center shadow"><i class="fas fa-file-alt text-xl text-blue-600"></i><div id="reportsCount" class="text-xl font-bold">0</div><div class="text-xs">تقارير</div></div>
                    <div class="bg-white rounded-xl p-3 text-center shadow"><i class="fas fa-pen-nib text-xl text-blue-600"></i><div id="articlesCount" class="text-xl font-bold">0</div><div class="text-xs">مقالات</div></div>
                    <div class="bg-white rounded-xl p-3 text-center shadow"><i class="fas fa-bullhorn text-xl text-blue-600"></i><div id="newsCount" class="text-xl font-bold">0</div><div class="text-xs">أخبار</div></div>
                    <div class="bg-white rounded-xl p-3 text-center shadow"><i class="fas fa-comments text-xl text-blue-600"></i><div id="interviewsCount" class="text-xl font-bold">0</div><div class="text-xs">حوارات</div></div>
                    <div class="bg-white rounded-xl p-3 text-center shadow"><i class="fas fa-users text-xl text-blue-600"></i><div id="quizCount" class="text-xl font-bold">0</div><div class="text-xs">مشاركات</div></div>
                    <div class="bg-white rounded-xl p-3 text-center shadow"><i class="fas fa-chart-line text-xl text-blue-600"></i><div id="avgScore" class="text-xl font-bold">--%</div><div class="text-xs">المتوسط</div></div>
                </div>
                
                <section id="reports" class="mb-8"><h2 class="text-lg md:text-xl font-bold mb-3"><i class="fas fa-newspaper text-blue-600 ml-2"></i> ${texts.reportsTitle}</h2><div id="reportsContainer" class="grid-responsive"></div></section>
                <section id="articles" class="mb-8"><h2 class="text-lg md:text-xl font-bold mb-3"><i class="fas fa-pen-fancy text-blue-600 ml-2"></i> ${texts.articlesTitle}</h2><div id="articlesContainer" class="grid-responsive"></div></section>
                <section id="news" class="mb-8"><h2 class="text-lg md:text-xl font-bold mb-3"><i class="fas fa-bullhorn text-blue-600 ml-2"></i> ${texts.newsTitle}</h2><div id="newsContainer" class="grid-responsive"></div></section>
                <section id="interviews" class="mb-8"><h2 class="text-lg md:text-xl font-bold mb-3"><i class="fas fa-comments text-blue-600 ml-2"></i> ${texts.interviewsTitle}</h2><div id="interviewsContainer" class="grid-responsive"></div></section>
                <section id="investigations" class="mb-8"><h2 class="text-lg md:text-xl font-bold mb-3"><i class="fas fa-microscope text-blue-600 ml-2"></i> ${texts.investigationsTitle}</h2><div id="investigationsContainer" class="grid-responsive"></div></section>
                <section id="infographics" class="mb-8"><h2 class="text-lg md:text-xl font-bold mb-3"><i class="fas fa-chart-pie text-blue-600 ml-2"></i> ${texts.infographicsTitle}</h2><div id="infographicsContainer" class="grid md:grid-cols-2 gap-4"></div></section>
                <section id="videos" class="mb-8"><h2 class="text-lg md:text-xl font-bold mb-3"><i class="fas fa-video text-blue-600 ml-2"></i> ${texts.videosTitle}</h2><div id="videosContainer" class="grid md:grid-cols-2 gap-4"></div></section>
                <section id="quiz"><div class="bg-white rounded-2xl shadow-xl overflow-hidden"><div class="bg-gradient-to-r from-blue-700 to-blue-900 px-4 md:px-6 py-4"><h2 class="text-xl md:text-2xl font-bold text-white">${texts.quizTitle}</h2><p class="text-blue-100 text-sm">اختبار علمي مكون من ${quizQuestions.length || '15'} سؤالاً لتقييم درجة إدمان الدوبامين</p></div><div class="p-4 md:p-6"><div id="quizContainer"></div><div id="quizResult" class="mt-6 hidden"></div></div></div></section>
            `;
            
            await loadSection('reports', 'reportsContainer');
            await loadSection('articles', 'articlesContainer');
            await loadSection('news', 'newsContainer');
            await loadSection('interviews', 'interviewsContainer');
            await loadSection('investigations', 'investigationsContainer');
            await loadSection('infographics', 'infographicsContainer');
            await loadVideos();
            await loadQuiz();
            await loadCounts();
            
            // Re-attach navigation
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    const href = this.getAttribute('href');
                    if (href && href.startsWith('#')) {
                        e.preventDefault();
                        const target = document.getElementById(href.substring(1));
                        if (target) target.scrollIntoView({ behavior: 'smooth' });
                    }
                });
            });
        }
        
        // Text Functions
        async function loadTexts() {
            const snap = await db.ref('site_texts').once('value');
            const texts = snap.val();
            if (texts) {
                document.title = texts.siteTitle || defaultTexts.siteTitle;
                document.getElementById('headerTitle').innerText = texts.headerTitle || defaultTexts.headerTitle;
                document.getElementById('footerText').innerText = texts.footer || defaultTexts.footer;
                return texts;
            }
            return defaultTexts;
        }
        
        window.saveTexts = async function() {
            const texts = {
                siteTitle: document.getElementById('textSiteTitle').value,
                headerTitle: document.getElementById('textHeaderTitle').value,
                heroTitle: document.getElementById('textHeroTitle').value,
                heroDesc: document.getElementById('textHeroDesc').value,
                reportsTitle: document.getElementById('textReportsTitle').value,
                articlesTitle: document.getElementById('textArticlesTitle').value,
                newsTitle: document.getElementById('textNewsTitle').value,
                interviewsTitle: document.getElementById('textInterviewsTitle').value,
                investigationsTitle: document.getElementById('textInvestigationsTitle').value,
                infographicsTitle: document.getElementById('textInfographicsTitle').value,
                videosTitle: document.getElementById('textVideosTitle').value,
                quizTitle: document.getElementById('textQuizTitle').value,
                footer: document.getElementById('textFooter').value
            };
            await db.ref('site_texts').set(texts);
            applyTexts(texts);
            Swal.fire("تم", "تم حفظ النصوص", "success");
        };
        
        function applyTexts(texts) {
            document.title = texts.siteTitle;
            document.getElementById('headerTitle').innerText = texts.headerTitle;
            document.getElementById('footerText').innerText = texts.footer;
        }
        
        async function loadCounts() {
            const r = await db.ref('reports').once('value');
            document.getElementById('reportsCount').innerText = r.numChildren() || '0';
            const a = await db.ref('articles').once('value');
            document.getElementById('articlesCount').innerText = a.numChildren() || '0';
            const n = await db.ref('news').once('value');
            document.getElementById('newsCount').innerText = n.numChildren() || '0';
            const i = await db.ref('interviews').once('value');
            document.getElementById('interviewsCount').innerText = i.numChildren() || '0';
            const q = await db.ref('quiz_results').once('value');
            document.getElementById('quizCount').innerText = q.numChildren() || '0';
            if (q.exists()) {
                let vals = Object.values(q.val());
                let tot = vals.reduce((s, v) => s + (v.percentage || 0), 0);
                document.getElementById('avgScore').innerText = Math.round(tot / vals.length) + '%';
            }
        }
        
        // Admin Functions
        function openAdminPanel() {
            const pwd = prompt("كلمة السر:");
            if (pwd === "admin2025") {
                document.getElementById('adminPanel').classList.add('open');
                document.getElementById('adminOverlay').classList.add('open');
                loadAllAdminLists();
                loadQuizToAdminForm();
                loadTextsToAdminForm();
            } else if (pwd !== null) {
                Swal.fire("خطأ", "كلمة سر غير صحيحة", "error");
            }
        }
        
        function closeAdminPanel() {
            document.getElementById('adminPanel').classList.remove('open');
            document.getElementById('adminOverlay').classList.remove('open');
        }
        
        function showAdminTab(tab) {
            const panels = ['reports','articles','news','interviews','investigations','infographics','videos','quiz','texts'];
            panels.forEach(t => document.getElementById(t+'Panel').classList.add('hidden'));
            document.getElementById(tab+'Panel').classList.remove('hidden');
            document.querySelectorAll('.admin-tab').forEach(x => x.classList.remove('active'));
            document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
        }
        
        async function loadAllAdminLists() {
            await loadList('reports', 'reportsList');
            await loadList('articles', 'articlesList');
            await loadList('news', 'newsList');
            await loadList('interviews', 'interviewsList');
            await loadList('investigations', 'investigationsList');
            await loadList('infographics', 'infographicsList');
            await loadList('videos', 'videosList');
        }
        
        async function loadList(col, elId) {
            const c = document.getElementById(elId);
            if (!c) return;
            const snap = await db.ref(col).once('value');
            const data = snap.val();
            c.innerHTML = '';
            if (data) {
                Object.entries(data).forEach(([id, item]) => {
                    c.innerHTML += `<div class="bg-gray-50 rounded-lg p-2 flex justify-between items-center"><span class="text-xs">${escapeHtml(item.title)}</span><button onclick="deleteItem('${col}','${id}')" class="bg-red-500 text-white px-2 py-0.5 rounded text-xs">حذف</button></div>`;
                });
            } else {
                c.innerHTML = '<div class="text-gray-400 text-center py-2 text-xs">لا يوجد</div>';
            }
        }
        
        window.addItem = async function(type) {
            let title = '';
            if (type === 'reports') title = document.getElementById('repTitle')?.value.trim();
            else if (type === 'articles') title = document.getElementById('artTitle')?.value.trim();
            else if (type === 'news') title = document.getElementById('newsTitle')?.value.trim();
            else if (type === 'interviews') title = document.getElementById('interTitle')?.value.trim();
            else if (type === 'investigations') title = document.getElementById('invTitle')?.value.trim();
            else if (type === 'infographics') title = document.getElementById('infTitle')?.value.trim();
            else if (type === 'videos') title = document.getElementById('vidTitle')?.value.trim();
            
            if (!title) return Swal.fire("خطأ", "العنوان مطلوب", "error");
            
            let item = { title: title, date: new Date().toLocaleDateString('ar-EG') };
            
            if (type === 'reports') {
                item.date = document.getElementById('repDate').value;
                item.image = document.getElementById('repImage').value;
                item.summary = document.getElementById('repSummary').value;
                item.content = document.getElementById('repContent').value;
                await db.ref('reports').push().set(item);
                clearForm(['repTitle','repDate','repImage','repSummary','repContent']);
                loadList('reports', 'reportsList');
            }
            else if (type === 'articles') {
                item.category = document.getElementById('artCategory').value;
                item.image = document.getElementById('artImage').value;
                item.summary = document.getElementById('artSummary').value;
                item.content = document.getElementById('artContent').value;
                item.readTime = parseInt(document.getElementById('artReadTime').value) || 5;
                await db.ref('articles').push().set(item);
                clearForm(['artTitle','artCategory','artImage','artSummary','artContent','artReadTime']);
                loadList('articles', 'articlesList');
            }
            else if (type === 'news') {
                item.date = document.getElementById('newsDate').value;
                item.image = document.getElementById('newsImage').value;
                item.summary = document.getElementById('newsSummary').value;
                item.content = document.getElementById('newsContent').value;
                await db.ref('news').push().set(item);
                clearForm(['newsTitle','newsDate','newsImage','newsSummary','newsContent']);
                loadList('news', 'newsList');
            }
            else if (type === 'interviews') {
                item.speaker = document.getElementById('interSpeaker').value;
                item.date = document.getElementById('interDate').value;
                item.image = document.getElementById('interImage').value;
                item.summary = document.getElementById('interSummary').value;
                item.content = document.getElementById('interContent').value;
                await db.ref('interviews').push().set(item);
                clearForm(['interTitle','interSpeaker','interDate','interImage','interSummary','interContent']);
                loadList('interviews', 'interviewsList');
            }
            else if (type === 'investigations') {
                item.image = document.getElementById('invImage').value;
                item.summary = document.getElementById('invSummary').value;
                item.content = document.getElementById('invContent').value;
                await db.ref('investigations').push().set(item);
                clearForm(['invTitle','invImage','invSummary','invContent']);
                loadList('investigations', 'investigationsList');
            }
            else if (type === 'infographics') {
                item.imageUrl = document.getElementById('infImage').value;
                await db.ref('infographics').push().set(item);
                clearForm(['infTitle','infImage']);
                loadList('infographics', 'infographicsList');
            }
            else if (type === 'videos') {
                item.videoUrl = document.getElementById('vidUrl').value;
                item.description = document.getElementById('vidDesc').value;
                await db.ref('videos').push().set(item);
                clearForm(['vidTitle','vidUrl','vidDesc']);
                loadList('videos', 'videosList');
            }
            
            Swal.fire("تم", "تم الحفظ بنجاح", "success");
            location.reload();
        };
        
        window.saveQuiz = async function() {
            try {
                let q = JSON.parse(document.getElementById('quizJson').value);
                if (!q.length) throw new Error();
                await db.ref('quiz/questions').set(q);
                Swal.fire("نجاح", "تم حفظ الأسئلة", "success");
                loadQuiz();
            } catch(e) { Swal.fire("خطأ", "JSON غير صالح", "error"); }
        };
        
        window.deleteItem = async function(col, id) {
            let r = await Swal.fire({ title: "تأكيد الحذف", icon: "warning", showCancelButton: true });
            if (r.isConfirmed) {
                await db.ref(`${col}/${id}`).remove();
                Swal.fire("تم الحذف", "", "success");
                loadAllAdminLists();
                if (!window.location.search) location.reload();
            }
        };
        
        function clearForm(ids) {
            ids.forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
        }
        
        function loadQuizToAdminForm() {
            const ta = document.getElementById('quizJson');
            if (ta && quizQuestions.length) ta.value = JSON.stringify(quizQuestions, null, 2);
        }
        
        async function loadTextsToAdminForm() {
            const snap = await db.ref('site_texts').once('value');
            const texts = snap.val() || defaultTexts;
            document.getElementById('textSiteTitle').value = texts.siteTitle || '';
            document.getElementById('textHeaderTitle').value = texts.headerTitle || '';
            document.getElementById('textHeroTitle').value = texts.heroTitle || '';
            document.getElementById('textHeroDesc').value = texts.heroDesc || '';
            document.getElementById('textReportsTitle').value = texts.reportsTitle || '';
            document.getElementById('textArticlesTitle').value = texts.articlesTitle || '';
            document.getElementById('textNewsTitle').value = texts.newsTitle || '';
            document.getElementById('textInterviewsTitle').value = texts.interviewsTitle || '';
            document.getElementById('textInvestigationsTitle').value = texts.investigationsTitle || '';
            document.getElementById('textInfographicsTitle').value = texts.infographicsTitle || '';
            document.getElementById('textVideosTitle').value = texts.videosTitle || '';
            document.getElementById('textQuizTitle').value = texts.quizTitle || '';
            document.getElementById('textFooter').value = texts.footer || '';
        }
        
        // Start
        route();
    </script>
</body>
</html>
