<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دوبامين | المركز العلمي</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0e27, #1a1a3e);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Cairo', sans-serif;
        }
        .loader {
            text-align: center;
            color: white;
        }
        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg2Xrst_-NA_H-l97_0RgyhAuotWFS2I2MI1A4uVBidAIYPCbajJumUTdar9u55C-VF7tKq4m_MUza7zBtxbV0hTTY_wojRA_ZNIfKVmThAuxDaFaO3CYpMOupFYpSsxSj1Kj9m7QDfHxgULcD89zvsQd3KRUKqZVAMlCgl0XivNh-amFmq6_ZzQJ4j2225/s729/18.jpg%20(1).jpeg') center/cover;
            margin: 0 auto 20px;
            animation: pulse 1.5s infinite;
            border: 3px solid rgba(59,130,246,0.5);
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-bar {
            width: 250px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            margin: 20px auto;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="logo"></div>
        <h2>دوبامين</h2>
        <p>المركز العلمي المتقدم</p>
        <div class="spinner"></div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <p id="progressText" style="font-size: 12px; opacity: 0.7;">جاري التحميل 0%</p>
    </div>

    <script>
        // محاكاة التحميل
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 20;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                setTimeout(() => {
                    // بعد التحميل، انتقل إلى المحتوى
                    window.location.href = 'project/index.html';
                }, 500);
            }
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').innerText = `جاري التحميل ${Math.floor(progress)}%`;
        }, 200);
    </script>
</body>
</html>
