<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دوبامين | المركز العلمي للدوبامين</title>
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        * { font-family: 'Cairo', sans-serif; }
        html { scroll-behavior: smooth; }
        
        :root { --primary: #2563eb; --primary-dark: #1d4ed8; }
        
        body { background: linear-gradient(135deg, #f8fafc, #eff6ff); }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(37, 99, 235, 0.15);
        }
        
        .premium-card {
            background: white;
            border-radius: 24px;
            transition: all 0.3s ease;
            border: 1px solid rgba(37, 99, 235, 0.1);
            overflow: hidden;
            cursor: pointer;
        }
        
        .premium-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -15px rgba(0, 0, 0, 0.15);
        }
        
        .card-cover {
            height: 200px;
            background-size: cover;
            background-position: center;
            background-color: #e2e8f0;
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* Admin Panel */
        .admin-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 90%;
            max-width: 500px;
            height: 100vh;
            background: white;
            z-index: 1000;
            transition: right 0.3s ease;
            overflow-y: auto;
            box-shadow: -5px 0 30px rgba(0,0,0,0.2);
        }
        
        .admin-panel.open { right: 0; }
        
        .admin-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        
        .admin-overlay.open { display: block; }
        
        .admin-tab {
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .admin-tab.active { background: var(--primary); color: white; }
        
        .quiz-option {
            padding: 12px;
            border-radius: 12px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        
        .quiz-option:hover { border-color: var(--primary); background: #eff6ff; }
        .quiz-option.selected { background: var(--primary); color: white; }
        
        .result-normal { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .result-recovery { background: linear-gradient(135deg, #eab308, #ca8a04); }
        .result-severe { background: linear-gradient(135deg, #ef4444, #dc2626); }
        
        .admin-trigger {
            position: fixed;
            bottom: 15px;
            left: 15px;
            width: 35px;
            height: 35px;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 98;
        }
        
        .admin-trigger:hover { background: rgba(0,0,0,0.5); color: white; }
        
        .scroll-top {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 45px;
            height: 45px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 99;
        }
        
        .scroll-top.visible { opacity: 1; visibility: visible; }
        
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            background: white;
            border-radius: 24px;
            border: 2px dashed #cbd5e1;
        }
        
        .empty-state i { font-size: 50px; color: #94a3b8; margin-bottom: 15px; }
        .empty-state h3 { font-size: 18px; font-weight: 600; color: #475569; }
        
        .shimmer {
            background: linear-gradient(90deg, #f1f5f9 0%, #e2e8f0 50%, #f1f5f9 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 20px;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .detail-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 35px;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1);
        }
        
        .detail-cover {
            width: 100%;
            height: 350px;
            background-size: cover;
            background-position: center;
            background-color: #e2e8f0;
            border-radius: 20px;
            margin-bottom: 25px;
        }
        
        .share-btn {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .share-btn:hover { background: #16a34a; color: white; }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .progress-bar { transition: width 1s ease-out; }
        
        .logo-img { height: 45px; width: auto; object-fit: contain; }
        
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 16px;
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        button { cursor: pointer; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="glass-nav sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex flex-wrap justify-between items-center">
            <a href="./" class="flex items-center gap-3">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiBvZ0YYLa9TxsEfprbBhFoVfHlVthVD82mlNonGJanDw7E79TtNrW_BrGeOcmwHK0Tp0BaXihRTF6P-dn2weeY4Kc6CrUQZwv5Z6xaaiMmL3U_XgpdDQPogdWWu4VMZ9qMc75XT3WZbHoWsDMSJpXe532L5JGsKZSXRegJ-5DOjPv9tMBAqKT03CFVpXJY/s640/moaz1.png" 
                     alt="Logo" class="logo-img">
                <h1 id="headerTitle" class="text-xl font-black gradient-text">دوبامين</h1>
            </a>
            <div class="flex flex-wrap gap-1" id="navLinks">
                <a href="./" class="nav-link px-3 py-1.5 text-gray-600 hover:text-blue-600 text-sm"><i class="fas fa-home ml-1"></i> الرئيسية</a>
                <a href="#reports" class="nav-link px-3 py-1.5 text-gray-600 hover:text-blue-600 text-sm"><i class="fas fa-newspaper ml-1"></i> التقارير</a>
                <a href="#articles" class="nav-link px-3 py-1.5 text-gray-600 hover:text-blue-600 text-sm"><i class="fas fa-pen-fancy ml-1"></i> المقالات</a>
                <a href="#investigations" class="nav-link px-3 py-1.5 text-gray-600 hover:text-blue-600 text-sm"><i class="fas fa-microscope ml-1"></i> التحقيقات</a>
                <a href="#infographics" class="nav-link px-3 py-1.5 text-gray-600 hover:text-blue-600 text-sm"><i class="fas fa-chart-pie ml-1"></i> إنفوجرافيك</a>
                <a href="#videos" class="nav-link px-3 py-1.5 text-gray-600 hover:text-blue-600 text-sm"><i class="fas fa-video ml-1"></i> فيديو</a>

    <!-- Main Content -->
    <main id="mainContent" class="container mx-auto px-4 py-8 max-w-6xl">
        <div class="shimmer h-96 w-full"></div>
    </main>

    <!-- Footer -->
    <footer id="siteFooter" class="bg-gray-900 text-white py-6 mt-10 text-center">
        <p id="footerText">© 2025 المركز العلمي للدوبامين</p>
    </footer>

    <!-- Admin Panel -->
    <div id="adminOverlay" class="admin-overlay"></div>
    <div id="adminPanel" class="admin-panel">
        <div class="bg-gray-900 text-white p-4 sticky top-0 flex justify-between">
            <span><i class="fas fa-lock ml-2"></i> لوحة الإدارة</span>
            <button onclick="closeAdminPanel()" class="text-white text-xl">&times;</button>
        </div>
        <div class="p-4">
            <div class="flex flex-wrap gap-2 mb-4 border-b pb-2">

                <button onclick="showAdminTab('articles')" class="admin-tab" id="tabArticles">المقالات</button>
                <button onclick="showAdminTab('investigations')" class="admin-tab" id="tabInvestigations">التحقيقات</button>
                <button onclick="showAdminTab('infographics')" class="admin-tab" id="tabInfographics">إنفوجرافيك</button>
                <button onclick="showAdminTab('videos')" class="admin-tab" id="tabVideos">فيديو</button>
                <button onclick="showAdminTab('quiz')" class="admin-tab" id="tabQuiz">الاختبار</button>
                <button onclick="showAdminTab('texts')" class="admin-tab" id="tabTexts">النصوص</button>

            <div id="reportsPanel">
                <div class="bg-blue-50 p-3 rounded-xl mb-4">
                    <input type="text" id="repTitle" placeholder="العنوان *" class="w-full border rounded-lg p-2 mb-2 text-sm">
                    <input type="text" id="repDate" placeholder="التاريخ" class="w-full border rounded-lg p-2 mb-2 text-sm">

                    <textarea id="repContent" placeholder="المحتوى الكامل" rows="4" class="w-full border rounded-lg p-2 mb-2 text-sm"></textarea>
                    <input type="text" id="repRef" placeholder="المرجع" class="w-full border rounded-lg p-2 mb-2 text-sm">

            <div id="articlesPanel" class="hidden">

                    <input type="text" id="artTitle" placeholder="العنوان *" class="w-full border rounded-lg p-2 mb-2 text-sm">
                    <input type="text" id="artCategory" placeholder="التصنيف" class="w-full border rounded-lg p-2 mb-2 text-sm">
                    <input type="text" id="artImage" placeholder="رابط الصورة" class="w-full border rounded-lg p-2 mb-2 text-sm">
                    <textarea id="artSummary" placeholder="الملخص" rows="2" class="w-full border rounded-lg p-2 mb-2 text-sm"></textarea>
                    <textarea id="artContent" placeholder="المحتوى الكامل" rows="4" class="w-full border rounded-lg p-2 mb-2 text-sm"></textarea>
                    <input type="number" id="artReadTime" placeholder="وقت القراءة" class="w-full border rounded-lg p-2 mb-2 text-sm">
                    <button onclick="addArticle()" class="w-full bg-green-600 text-white py-2 rounded-lg">حفظ</button>
                </div>

            </div>
            
            <div id="investigationsPanel" class="hidden">
                <div class="bg-purple-50 p-3 rounded-xl mb-4">
                    <input type="text" id="invTitle" placeholder="العنوان *" class="w-full border rounded-lg p-2 mb-2 text-sm">
                    <textarea id="invSummary" placeholder="الوصف" rows="2" class="w-full border rounded-lg p-2 mb-2 text-sm"></textarea>
                    <button onclick="addInvestigation()" class="w-full bg-purple-600 text-white py-2 rounded-lg">حفظ</button>
                </div>
                <div id="investigationsList" class="space-y-2 max-h-80 overflow-y-auto"></div>
            </div>
            
            <div id="infographicsPanel" class="hidden">
                <div class="bg-orange-50 p-3 rounded-xl mb-4">
                    <input type="text" id="infTitle" placeholder="العنوان *" class="w-full border rounded-lg p-2 mb-2 text-sm">
                    <input type="text" id="infImage" placeholder="رابط الصورة" class="w-full border rounded-lg p-2 mb-2 text-sm">
                    <button onclick="addInfographic()" class="w-full bg-orange-600 text-white py-2 rounded-lg">حفظ</button>
                </div>
                <div id="infographicsList" class="space-y-2 max-h-80 overflow-y-auto"></div>
            </div>
            
            <div id="videosPanel" class="hidden">
                <div class="bg-red-50 p-3 rounded-xl mb-4">
                    <input type="text" id="vidTitle" placeholder="العنوان *" class="w-full border rounded-lg p-2 mb-2 text-sm">
                    <input type="text" id="vidUrl" placeholder="رابط يوتيوب" class="w-full border rounded-lg p-2 mb-2 text-sm">

            <div id="textsPanel" class="hidden">
                <div class="bg-indigo-50 p-3 rounded-xl">
                    <input type="text" id="textSiteTitle" placeholder="عنوان الصفحة" class="w-full border rounded-lg p-2 mb-2 text-sm">

                    <input type="text" id="textHeroTitle" placeholder="نص الهيرو" class="w-full border rounded-lg p-2 mb-2 text-sm">
                    <textarea id="textHeroDesc" placeholder="وصف الهيرو" rows="2" class="w-full border rounded-lg p-2 mb-2 text-sm"></textarea>
                    <input type="text" id="textReportsTitle" placeholder="عنوان التقارير" class="w-full border rounded-lg p-2 mb-2 text-sm">
                    <input type="text" id="textArticlesTitle" placeholder="عنوان المقالات" class="w-full border rounded-lg p-2 mb-2 text-sm">
                    <input type="text" id="textInvestigationsTitle" placeholder="عنوان التحقيقات" class="w-full border rounded-lg p-2 mb-2 text-sm">
                    <input type="text" id="textInfographicsTitle" placeholder="عنوان الإنفوجرافيك" class="w-full border rounded-lg p-2 mb-2 text-sm">
                    <input type="text" id="textVideosTitle" placeholder="عنوان الفيديو" class="w-full border rounded-lg p-2 mb-2 text-sm">
                    <input type="text" id="textQuizTitle" placeholder="عنوان الاختبار" class="w-full border rounded-lg p-2 mb-2 text-sm">
                    <input type="text" id="textFooter" placeholder="نص التذييل" class="w-full border rounded-lg p-2 mb-2 text-sm">

    <!-- Admin Trigger -->
    <div class="admin-trigger" onclick="openAdminPanel()">
        <i class="fas fa-cog text-gray-600 text-sm"></i>
    </div>
    
    <div id="scrollTopBtn" class="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <i class="fas fa-arrow-up text-white"></i>
    </div>

    <script>
        // Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCuYQh5gqlss3gdRjpSPZm-zShiwSAtetQ",
            authDomain: "prmaga1.firebaseapp.com",
            databaseURL: "https://prmaga1-default-rtdb.firebaseio.com/",
            projectId: "prmaga1",
            storageBucket: "prmaga1.firebasestorage.app",
            messagingSenderId: "750206146558",
            appId: "1:750206146558:web:43ca060ad36e830ca252af"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // Global
        let quizData = [];
        let quizAnswers = [];
        
        const defaultTexts = {
            siteTitle: "دوبامين | المركز العلمي للدوبامين",
            headerTitle: "دوبامين",
            heroTitle: "الدوبامين",
            heroDesc: "استكشف أحدث الأبحاث والتقارير حول الناقل العصبي الأكثر تأثيرًا",
            reportsTitle: "التقارير العلمية",
            articlesTitle: "المقالات العلمية",
            investigationsTitle: "التحقيقات الميدانية",
            infographicsTitle: "الإنفوجرافيك",
            videosTitle: "الفيديوهات",
            quizTitle: "مقياس إدمان الدوبامين",
            footer: "© 2025 المركز العلمي للدوبامين"
        };
        
        // Helper functions
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
        
        function getYouTubeEmbedUrl(url) {
            if (!url) return '';
            if (url.includes('youtu.be/')) {
                let id = url.split('youtu.be/')[1];
                if (id) { id = id.split('?')[0]; return `https://www.youtube.com/embed/${id}`; }
            }
            if (url.includes('youtube.com/watch')) {
                let params = new URLSearchParams(url.split('?')[1]);
                let id = params.get('v');
                if (id) return `https://www.youtube.com/embed/${id}`;
            }
            if (url.includes('youtube.com/embed/')) return url;
            return url;
        }
        
        // Initialize AOS
        AOS.init({ duration: 800, once: true });
        
        // Scroll to top
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollTopBtn');
            if (window.scrollY > 300) btn.classList.add('visible');
            else btn.classList.remove('visible');
        });
        
        // Fix navigation links - make sure they scroll to sections
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && href.startsWith('#')) {
                    e.preventDefault();
                    const targetId = href.substring(1);
                    const target = document.getElementById(targetId);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth' });
                    }
                }
            });
        });
        
        // Routing
        function getParams() {
            const p = new URLSearchParams(window.location.search);
            return { type: p.get('type'), id: p.get('id') };
        }
        
        async function route() {
            const p = getParams();
            if (p.type === 'article' && p.id) await showArticle(p.id);
            else if (p.type === 'report' && p.id) await showReport(p.id);
            else await showHome();
        }
        
        window.sharePage = function() {
            const url = window.location.href;
            if (navigator.share) navigator.share({ title: document.title, url: url });
            else navigator.clipboard.writeText(url).then(() => Swal.fire("تم نسخ الرابط", "", "success"));
        };
        
        // Show Article
        async function showArticle(id) {
            const main = document.getElementById('mainContent');
            main.innerHTML = '<div class="shimmer h-96 max-w-4xl mx-auto"></div>';
            try {
                const snap = await db.ref(`articles/${id}`).once('value');
                const article = snap.val();
                if (!article) throw new Error();
                document.title = `${article.title} | دوبامين`;
                main.innerHTML = `
                    <div class="detail-container">
                        <div class="detail-cover" style="background-image: url('${article.image || ''}')"></div>
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full">${escapeHtml(article.category || 'علوم')}</span>
                            <button onclick="sharePage()" class="share-btn px-4 py-2 rounded-lg text-sm"><i class="fas fa-share-alt ml-1"></i> مشاركة</button>
                        </div>
                        <h1 class="text-2xl md:text-3xl font-bold mb-4">${escapeHtml(article.title)}</h1>
                        <div class="text-gray-700 leading-relaxed">
                            ${(article.content || article.summary || 'لا يوجد محتوى').split(/\n\n/).map(p => `<p class="mb-4">${escapeHtml(p)}</p>`).join('')}
                        </div>
                        <div class="border-t mt-6 pt-4 text-center">
                            <a href="./" class="text-blue-600 hover:underline"><i class="fas fa-arrow-right ml-1"></i> العودة للرئيسية</a>
                        </div>
                    </div>
                `;
            } catch(e) {
                main.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>المقال غير موجود</h3><a href="./" class="inline-block mt-4 bg-blue-600 text-white px-5 py-2 rounded-lg">الرئيسية</a></div>`;
            }
        }
        
        // Show Report
        async function showReport(id) {
            const main = document.getElementById('mainContent');
            main.innerHTML = '<div class="shimmer h-96 max-w-4xl mx-auto"></div>';
            try {
                const snap = await db.ref(`reports/${id}`).once('value');
                const report = snap.val();
                if (!report) throw new Error();
                document.title = `${report.title} | دوبامين`;
                main.innerHTML = `
                    <div class="detail-container">
                        <div class="detail-cover" style="background-image: url('${report.image || ''}')"></div>
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full">تقرير علمي</span>

        // Quiz
        async function loadQuiz() {
            const c = document.getElementById('quizContainer');
            if (!c) return;
            const snap = await db.ref('quiz/questions').once('value');
            if (!snap.exists()) {
                c.innerHTML = `<div class="empty-state"><i class="fas fa-tasks"></i><h3>الاختبار غير جاهز</h3></div>`;
                return;
            }
            quizData = snap.val();
            quizAnswers = new Array(quizData.length).fill(-1);
            c.innerHTML = quizData.map((q, idx) => `
                <div class="border-b pb-4 mb-4" data-qidx="${idx}">
                    <p class="font-bold mb-3"><span class="w-6 h-6 bg-blue-600 text-white rounded-full inline-flex items-center justify-center text-sm ml-2">${idx+1}</span> ${escapeHtml(q.text)}</p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                        ${q.options.map((opt, oidx) => `<div class="quiz-option" data-q="${idx}" data-opt="${oidx}">${escapeHtml(opt)}</div>`).join('')}
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.quiz-option').forEach(el => {
                el.addEventListener('click', function() {
                    const q = parseInt(this.dataset.q);
                    const o = parseInt(this.dataset.opt);
                    quizAnswers[q] = o;
                    const parent = this.closest('.border-b');
                    parent.querySelectorAll('.quiz-option').forEach(x => x.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });
        }
        
        document.getElementById('submitQuizBtn')?.addEventListener('click', async () => {
            if (!quizData.length) return;
            let missing = [];
            for (let i=0; i<quizData.length; i++) if (quizAnswers[i] === -1) missing.push(i+1);
            if (missing.length) {
                Swal.fire("تنبيه", `الرجاء الإجابة على الأسئلة: ${missing.join(', ')}`, "warning");
                return;
            }
            let total = 0, max = quizData.length * 4;
            for (let i=0; i<quizData.length; i++) total += quizData[i].scores[quizAnswers[i]];
            const percent = Math.round((total/max)*100);
            let resultClass = '', title = '', message = '', advice = '';
            if (percent <= 40) { resultClass = 'result-normal'; title = '🟢 منخفض'; message = 'مستوى طبيعي'; advice = '✅ حافظ على عاداتك'; }
            else if (percent <= 60) { resultClass = 'result-recovery'; title = '🟡 متوسط'; message = 'يوجد اعتماد زائد'; advice = '📱 قلل استخدام وسائل التواصل\n🏃 مارس الرياضة'; }
            else { resultClass = 'result-severe'; title = '🔴 مرتفع'; message = 'اعتماد شديد على الدوبامين'; advice = '⚠️ استشر طبيباً نفسياً'; }
            const resultDiv = document.getElementById('quizResult');
            resultDiv.innerHTML = `
                <div class="${resultClass} text-white p-6 rounded-xl text-center">
                    <i class="fas fa-chart-line text-4xl mb-3"></i>
                    <h3 class="text-xl font-bold">${title}</h3>
                    <div class="text-5xl font-bold my-3">${percent}%</div>
                    <div class="w-full bg-white/30 rounded-full h-2 mb-3"><div class="progress-bar h-2 rounded-full bg-white" style="width:0%"></div></div>
                    <p>${message}</p>
                    <div class="bg-white/20 rounded-lg p-3 mt-3"><p class="text-sm whitespace-pre-line">${advice}</p></div>
                    <button onclick="location.reload()" class="mt-4 bg-white text-gray-800 px-5 py-2 rounded-lg">إعادة</button>
                </div>
            `;
            resultDiv.classList.remove('hidden');
            setTimeout(() => { document.querySelector('.progress-bar').style.width = percent + '%'; }, 100);
            await db.ref('quiz_results').push().set({ percentage: percent, date: new Date().toISOString() });
            loadCounts();
        });

            let title = document.getElementById('vidTitle').value.trim();
            let url = document.getElementById('vidUrl').value.trim();
            if (!title || !url) return Swal.fire("خطأ", "العنوان والرابط مطلوبان", "error");
            await db.ref('videos').push().set({ title, videoUrl: url });
            Swal.fire("تم", "تم إضافة الفيديو", "success");
            document.getElementById('vidTitle').value = ''; document.getElementById('vidUrl').value = '';
            loadAdminLists(); loadVideos();
        };
        
        window.saveQuiz = async function() {
            try {
                let q = JSON.parse(document.getElementById('quizJson').value);
                if (!q.length) throw new Error();
                await db.ref('quiz/questions').set(q);
                Swal.fire("نجاح", "تم حفظ الأسئلة", "success");
                loadQuiz();
            } catch(e) { Swal.fire("خطأ", "JSON غير صالح", "error"); }
        };
        
        window.deleteItem = async function(col, id) {
            let r = await Swal.fire({ title: "تأكيد الحذف", icon: "warning", showCancelButton: true });
            if (r.isConfirmed) {
                await db.ref(`${col}/${id}`).remove();
                Swal.fire("تم الحذف", "", "success");
                loadAdminLists();
                if (!window.location.search) { loadReports(); loadArticles(); loadInvestigations(); loadInfographics(); loadVideos(); }
            }
        };
        
        // Start
        route();
    </script>
</body>
</html>
