<body>

    <!-- شاشة التحميل الاحترافية -->

    <noscript>
        <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:20000;display:flex;justify-content:center;align-items:center;flex-direction:column;padding:20px;text-align:center">
      
        </div>

    <script>
        // ==================== شاشة التحميل المتقدمة ====================
        
        // عناصر شاشة التحميل
        const splashScreen = document.getElementById('splashScreen');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const tipText = document.getElementById('tipText');
        const frame = document.getElementById('secureFrame');
        const errorContainer = document.getElementById('errorContainer');
        
        // نصائح متداولة
        const tips = [
            { icon: "fa-brain", text: "الدوبامين هو مفتاح التحفيز والمكافأة في الدماغ" },
            { icon: "fa-heart", text: "الرياضة تزيد إفراز الدوبامين بشكل طبيعي" },
            { icon: "fa-music", text: "الاستماع للموسيقى يحفز إفراز الدوبامين" },
            { icon: "fa-sun", text: "التعرض لأشعة الشمس يزيد من مستويات الدوبامين" },
            { icon: "fa-apple-alt", text: "الأطعمة الغنية بالتيروزين تعزز إنتاج الدوبامين" },
            { icon: "fa-bed", text: "النوم الجيد ينظم مستويات الدوبامين في الدماغ" },
            { icon: "fa-hand-peace", text: "التأمل يزيد من إفراز الدوبامين" },
            { icon: "fa-chart-line", text: "تحديد الأهداف الصغيرة يحفز إفراز الدوبامين" }
        ];
        
        // متغيرات التحميل
        let progress = 0;
        let tipIndex = 0;
        let loadInterval;
        let tipInterval;
        
        // تحديث شريط التقدم
        function updateProgress() {
            if (progress < 100) {
                progress += Math.random() * 15 + 5;
                if (progress > 100) progress = 100;
                progressFill.style.width = progress + '%';
                progressText.innerText = `جاري التحميل ${Math.floor(progress)}%`;
            }
        }
        
        // تغيير النصيحة
        function changeTip() {
            tipIndex = (tipIndex + 1) % tips.length;
            const tip = tips[tipIndex];
            tipText.innerHTML = `<i class="fas ${tip.icon}"></i> ${tip.text}`;
            tipText.style.opacity = '0';
            setTimeout(() => {
                tipText.style.opacity = '1';
            }, 300);
        }
        
        // بدء التحميل التدريجي
        function startLoadingAnimation() {
            loadInterval = setInterval(updateProgress, 200);
            tipInterval = setInterval(changeTip, 4000);
        }
        
        // إنهاء شاشة التحميل
        function finishLoading() {
            clearInterval(loadInterval);
            clearInterval(tipInterval);
            
            // ضبط التقدم إلى 100%
            progressFill.style.width = '100%';
            progressText.innerText = 'جاري التحميل 100%';
            
            // إخفاء شاشة التحميل بعد تأخير بسيط
            setTimeout(() => {
                splashScreen.classList.add('hide');
                setTimeout(() => {
                    splashScreen.style.display = 'none';
                }, 800);
            }, 500);
        }
        
        // عرض شريط التحميل
        startLoadingAnimation();
        
        // ==================== إدارة تحميل الإطار ====================
        
        let loadTimeout;
        let retryCount = 0;
        const maxRetries = 3;
        
        function showError() {
            errorContainer.classList.add('show');
        }
        
        function hideError() {
            errorContainer.classList.remove('show');
        }
        
        function startLoadTimer() {
            clearTimeout(loadTimeout);
            loadTimeout = setTimeout(function() {
                if (!frame.classList.contains('visible')) {
                    if (retryCount < maxRetries) {
                        retryCount++;
                        console.log('محاولة إعادة التحميل رقم', retryCount);
                        frame.src = 'app.html';
                        startLoadTimer();
                    } else {
                        showError();
                        finishLoading();
                    }
                }
            }, 8000);
        }
        
        frame.addEventListener('load', function() {
            clearTimeout(loadTimeout);
            retryCount = 0;
            frame.classList.add('visible');
            finishLoading();
        });
        
        // بدء المؤقت
        startLoadTimer();
        
        // وظيفة إعادة المحاولة
        window.reloadSecureApp = function() {
            hideError();
            frame.classList.remove('visible');
            frame.src = 'app.html';
            retryCount = 0;
            startLoadTimer();
            
            // إعادة شاشة التحميل
            splashScreen.classList.remove('hide');
            splashScreen.style.display = 'flex';
            progress = 0;
            progressFill.style.width = '0%';
            progressText.innerText = 'جاري التحميل 0%';
            startLoadingAnimation();
        };
        
        // ==================== الحماية المتقدمة ====================
        
        // منع اختصارات أدوات المطور
        (function() {
            const blockedKeys = [
                { key: 'F12', preventDefault: true },
                { key: 'I', ctrl: true, shift: true, preventDefault: true },
                { key: 'J', ctrl: true, shift: true, preventDefault: true },
                { key: 'C', ctrl: true, shift: true, preventDefault: true },
                { key: 'u', ctrl: true, preventDefault: true },
                { key: 's', ctrl: true, preventDefault: true },
                { key: 'p', ctrl: true, preventDefault: true },
                { key: 'r', ctrl: true, preventDefault: true },
                { key: 'F5', preventDefault: true }
            ];
            
            document.addEventListener('keydown', function(e) {
                for (let blocker of blockedKeys) {
                    let match = true;
                    if (blocker.key && e.key !== blocker.key) match = false;
                    if (blocker.ctrl && !e.ctrlKey) match = false;
                    if (blocker.shift && !e.shiftKey) match = false;
                    if (match && blocker.preventDefault) {
                        e.preventDefault();
                        return false;
                    }
                }
            });
        })();
        
        // منع النقر بزر الماوس الأيمن
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        // منع السحب والإفلات
        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
            return false;
        });
        
        document.addEventListener('drop', function(e) {
            e.preventDefault();
            return false;
        });
        
        // منع تحديد النص
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
            return false;
        });
        
        // منع النسخ
        document.addEventListener('copy', function(e) {
            e.preventDefault();
            return false;
        });
        
        // تعطيل الكونسول
        (function() {
            const noop = function() {};
            if (typeof window.console !== 'undefined') {
                const methods = ['log', 'debug', 'info', 'warn', 'error', 'table', 'trace'];
                for (let i = 0; i < methods.length; i++) {
                    if (window.console[methods[i]]) {
                        window.console[methods[i]] = noop;
                    }
                }
            }
        })();
        
        // علامة مائية
        function generateWatermark() {
            const watermark = document.getElementById('watermark');
            if (watermark) {
                const timestamp = Date.now().toString(36);
                watermark.innerHTML = `🔒 ${timestamp}`;
            }
        }
        generateWatermark();
        
        // عداد زائر وهمي
        function generateVisitCounter() {
            const counter = document.getElementById('visitCounter');
            if (counter) {
                const randomVisits = Math.floor(Math.random() * 5000) + 1000;
                counter.innerHTML = `👥 ${randomVisits.toLocaleString()} زائر اليوم`;
            }
        }
        generateVisitCounter();
        
        // تحميل Font Awesome
        const fontAwesome = document.createElement('link');
        fontAwesome.rel = 'stylesheet';
        fontAwesome.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css';
        document.head.appendChild(fontAwesome);
        
        // تحميل Google Font
        const googleFont = document.createElement('link');
        googleFont.rel = 'stylesheet';
        googleFont.href = 'https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap';
        document.head.appendChild(googleFont);
        
        console.log("%c⚠️ هذا الموقع محمي. جميع المحاولات مسجلة.", "color: red; font-size: 14px;");
    </script>
</body>
</html>
