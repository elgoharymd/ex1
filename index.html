<body>

    <div class="splash-screen" id="splashScreen">
        <div style="text-align: center;">
            <div class="splash-logo"></div>
            <h1 class="splash-title">دوبامين</h1>
            <p class="splash-subtitle">المركز العلمي المتقدم</p>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <p class="progress-text" id="progressText">جاري التحميل 0%</p>
        </div>
    </div>

    <iframe id="secureFrame" class="secure-iframe" src="project/index.html" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation" loading="eager"></iframe>

    <div class="error-container" id="errorContainer">
        <div class="error-card">
            <i class="fas fa-wifi" style="font-size: 50px; color: #ef4444;"></i>
            <h3>حدث خطأ في الاتصال</h3>
            <button onclick="reloadApp()">إعادة المحاولة</button>
        </div>
    </div>

    <script>
        const splash = document.getElementById('splashScreen');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const frame = document.getElementById('secureFrame');
        const errorDiv = document.getElementById('errorContainer');
        
        let progress = 0;
        let loadInterval = setInterval(() => {
            progress += Math.random() * 15 + 5;
            if (progress >= 100) progress = 100;
            progressFill.style.width = progress + '%';
            progressText.innerText = `جاري التحميل ${Math.floor(progress)}%`;
            if (progress >= 100) clearInterval(loadInterval);
        }, 200);
        
        let timeout = setTimeout(() => {
            if (!frame.classList.contains('visible')) {
                errorDiv.classList.add('show');
                splash.classList.add('hide');
            }
        }, 10000);
        
        frame.addEventListener('load', () => {
            clearTimeout(timeout);
            frame.classList.add('visible');
            setTimeout(() => {
                splash.classList.add('hide');
            }, 500);
        });
        
        window.reloadApp = function() {
            errorDiv.classList.remove('show');
            splash.classList.remove('hide');
            frame.classList.remove('visible');
            frame.src = 'project/index.html';
            progress = 0;
            progressFill.style.width = '0%';
            progressText.innerText = 'جاري التحميل 0%';
            loadInterval = setInterval(() => {
                progress += Math.random() * 15 + 5;
                if (progress >= 100) progress = 100;
                progressFill.style.width = progress + '%';
                progressText.innerText = `جاري التحميل ${Math.floor(progress)}%`;
                if (progress >= 100) clearInterval(loadInterval);
            }, 200);
            timeout = setTimeout(() => {
                if (!frame.classList.contains('visible')) {
                    errorDiv.classList.add('show');
                    splash.classList.add('hide');
                }
            }, 10000);
        };
        
        // تحميل Font Awesome
        const fa = document.createElement('link');
        fa.rel = 'stylesheet';
        fa.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css';
        document.head.appendChild(fa);
        
        // تحميل Google Font
        const gf = document.createElement('link');
        gf.rel = 'stylesheet';
        gf.href = 'https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap';
        document.head.appendChild(gf);
        
        // منع أدوات المطور
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
            }
        });
    </script>
