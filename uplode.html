
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="jpMp5DgPIK1zfpJjYl0AoBZ7dZQ64dHe-59k28jXsDw" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>elgoharyx رفع الصور</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 1.5rem; }
        input[type="file"] { margin-bottom: 1rem; border: 1px solid #ddd; padding: 10px; width: 100%; border-radius: 5px; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #result { margin-top: 1.5rem; display: none; }
        .preview { max-width: 100%; height: auto; border-radius: 10px; margin-top: 10px; border: 1px solid #eee; }
        .url-box { background: #eee; padding: 10px; font-size: 12px; word-break: break-all; border-radius: 5px; margin-top: 10px; border: 1px dashed #999; }
        .loader { display: none; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>رفع صورة جديدة</h2>
    <input type="file" id="imageInput" accept="image/*">
    <button id="uploadBtn" onclick="handleUpload()">رفع الصورة الآن</button>
    
    <div class="loader" id="loader">جاري الرفع... انتظر قليلاً</div>

    <div id="result">
        <p style="color: green; font-weight: bold;">تم الرفع بنجاح! ✅</p>
        <img id="imagePreview" class="preview" src="" alt="Preview">
        <div class="url-box" id="urlDisplay"></div>
        <p style="font-size: 11px; color: #666;">يمكنك نسخ هذا الرابط ووضعه في Firebase</p>
    </div>
</div>

<script>
    async function handleUpload() {
        const input = document.getElementById('imageInput');
        const btn = document.getElementById('uploadBtn');
        const loader = document.getElementById('loader');
        const resultDiv = document.getElementById('result');
        const urlDisplay = document.getElementById('urlDisplay');
        const imgPreview = document.getElementById('imagePreview');

        if (!input.files[0]) {
            alert("من فضلك اختر صورة أولاً!");
            return;
        }

        // إظهار حالة التحميل
        btn.disabled = true;
        loader.style.display = 'block';
        resultDiv.style.display = 'none';

        const formData = new FormData();
        formData.append('image', input.files[0]);

        // استخدام الـ API Key الخاص بك
        const apiKey = '926c4a15635bfbd9038815bcbc0184ad';

        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                // عرض النتيجة
                imgPreview.src = data.data.url;
                urlDisplay.innerText = data.data.url;
                resultDiv.style.display = 'block';
            } else {
                alert("حدث خطأ في الرفع، تأكد من الـ API Key");
            }
        } catch (error) {
            console.error("Error:", error);
            alert("فشل الاتصال بالسيرفر");
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
